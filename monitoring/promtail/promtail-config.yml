server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape all Docker container stdout/stderr (pino JSON from mpx-api).
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
    pipeline_stages:
      # Parse the structured pino JSON so labels/fields are queryable in Loki.
      - json:
          expressions:
            severity: severity
            category: category
            request_id: request_id
            action: action
            outcome: outcome
      - labels:
          severity:
          category:
          outcome:
